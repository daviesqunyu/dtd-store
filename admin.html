<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — DTD Store</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; padding: 20px; }
    h1 { color: #00e5ff; margin-bottom: 24px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .tab { padding: 10px 20px; border-radius: 8px; cursor: pointer; background: #1a1a1a; border: 1px solid #333; color: #aaa; }
    .tab.active { background: #00e5ff; color: #000; font-weight: bold; }
    .section { display: none; }
    .section.active { display: block; }
    input, textarea, select { width: 100%; padding: 12px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 1rem; margin-bottom: 12px; }
    label { color: #aaa; font-size: 0.9rem; display: block; margin-bottom: 4px; }
    .btn { background: #00e5ff; color: #000; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 4px; }
    .btn.red { background: #ff5252; color: #fff; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th { background: #1a1a1a; padding: 12px; text-align: left; color: #00e5ff; }
    td { padding: 12px; border-bottom: 1px solid #222; font-size: 0.9rem; word-break: break-all; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
    .badge.delivered { background: #00e5ff22; color: #00e5ff; }
    .badge.pending { background: #ff525222; color: #ff5252; }
    .login-box { max-width: 400px; margin: 100px auto; background: #1a1a1a; padding: 32px; border-radius: 16px; border: 1px solid #222; }
    .login-box h2 { color: #00e5ff; margin-bottom: 24px; }
    .msg { padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 0.9rem; }
    .msg.success { background: #00e5ff22; color: #00e5ff; }
    .msg.error { background: #ff525222; color: #ff5252; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>🔐 Admin Login</h2>
    <div id="login-msg"></div>
    <label>Email</label>
    <input type="email" id="login-email" placeholder="admin@dtd.store" />
    <label>Password</label>
    <input type="password" id="login-pass" placeholder="••••••••" />
    <button class="btn" id="login-btn">Login</button>
  </div>
</div>

<div id="admin-screen" style="display:none">
  <h1>⚡ DTD Store Admin</h1>
  <button class="btn red" id="logout-btn" style="margin-bottom:20px">Logout</button>

  <div class="tabs">
    <div class="tab active" data-tab="products">Products</div>
    <div class="tab" data-tab="add">Add Product</div>
    <div class="tab" data-tab="stock">Add Stock</div>
    <div class="tab" data-tab="orders">Orders</div>
  </div>

  <div class="section active" id="tab-products">
    <table>
      <thead><tr><th>Name</th><th>Price</th><th>Currency</th><th>Active</th></tr></thead>
      <tbody id="products-list"><tr><td colspan="4">Loading...</td></tr></tbody>
    </table>
  </div>

  <div class="section" id="tab-add">
    <div id="add-msg"></div>
    <label>Product Name</label>
    <input type="text" id="p-name" placeholder="e.g. Netflix Premium" />
    <label>Description</label>
    <input type="text" id="p-desc" placeholder="What does the buyer get?" />
    <label>Price in lowest unit (e.g. 50000 = KES 500)</label>
    <input type="number" id="p-price" placeholder="50000" />
    <label>Currency</label>
    <input type="text" id="p-currency" value="KES" />
    <button class="btn" id="add-product-btn">Add Product</button>
  </div>

  <div class="section" id="tab-stock">
    <div id="stock-msg"></div>
    <label>Select Product</label>
    <select id="stock-product"></select>
    <label>Delivery Codes (one per line)</label>
    <textarea id="stock-codes" rows="8" placeholder="CODE-001&#10;CODE-002&#10;CODE-003"></textarea>
    <button class="btn" id="add-stock-btn">Save Stock</button>
  </div>

  <div class="section" id="tab-orders">
    <table>
      <thead><tr><th>Ref</th><th>Email</th><th>Amount</th><th>Status</th></tr></thead>
      <tbody id="orders-list"><tr><td colspan="4">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const supabase = createClient(
    'https://dceepbjxwwqojxvmpduj.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjZWVwYmp4d3dxb2p4dm1wZHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5OTg5NTMsImV4cCI6MjA5NzU3NDk1M30.nr2JBQKQ5GxNJDitFoAkZn6QuUl98LlymQH5kuk5A6I'
  );

  // --- AUTH ---
  document.getElementById('login-btn').onclick = async () => {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value.trim();
    const msg = document.getElementById('login-msg');
    if (!email || !pass) { msg.innerHTML = '<div class="msg error">Fill in both fields</div>'; return; }
    const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
    if (error) {
      msg.innerHTML = `<div class="msg error">${error.message}</div>`;
    } else {
      showAdmin();
    }
  };

  document.getElementById('logout-btn').onclick = async () => {
    await supabase.auth.signOut();
    document.getElementById('login-screen').style.display = 'block';
    document.getElementById('admin-screen').style.display = 'none';
  };

  // --- TABS ---
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    };
  });

  // --- SHOW ADMIN ---
  function showAdmin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadProducts();
    loadOrders();
    loadProductSelect();
  }

  // --- PRODUCTS ---
  async function loadProducts() {
    const { data, error } = await supabase.from('products').select('*');
    if (error || !data) return;
    document.getElementById('products-list').innerHTML = data.map(p => `
      <tr>
        <td>${p.name}</td>
        <td>${(p.price_kobo/100).toFixed(2)}</td>
        <td>${p.currency}</td>
        <td>${p.is_active ? '✅' : '❌'}</td>
      </tr>
    `).join('') || '<tr><td colspan="4">No products yet</td></tr>';
  }

  async function loadProductSelect() {
    const { data } = await supabase.from('products').select('id, name').eq('is_active', true);
    document.getElementById('stock-product').innerHTML = (data || []).map(p =>
      `<option value="${p.id}">${p.name}</option>`
    ).join('') || '<option>No products found</option>';
  }

  document.getElementById('add-product-btn').onclick = async () => {
    const name = document.getElementById('p-name').value.trim();
    const description = document.getElementById('p-desc').value.trim();
    const price_kobo = parseInt(document.getElementById('p-price').value);
    const currency = document.getElementById('p-currency').value.trim();
    const msg = document.getElementById('add-msg');
    if (!name || !price_kobo) { msg.innerHTML = '<div class="msg error">Name and price required</div>'; return; }
    const { error } = await supabase.from('products').insert({ name, description, price_kobo, currency, is_active: true });
    if (error) {
      msg.innerHTML = `<div class="msg error">${error.message}</div>`;
    } else {
      msg.innerHTML = '<div class="msg success">✅ Product added!</div>';
      loadProducts(); loadProductSelect();
    }
  };

  // --- STOCK ---
  document.getElementById('add-stock-btn').onclick = async () => {
    const product_id = document.getElementById('stock-product').value;
    const codes = document.getElementById('stock-codes').value.trim().split('\n').filter(c => c.trim());
    const msg = document.getElementById('stock-msg');
    if (!codes.length) { msg.innerHTML = '<div class="msg error">No codes entered</div>'; return; }
    const rows = codes.map(c => ({ product_id, content: c.trim(), sold: false }));
    const { error } = await supabase.from('stock_items').insert(rows);
    if (error) {
      msg.innerHTML = `<div class="msg error">${error.message}</div>`;
    } else {
      msg.innerHTML = `<div class="msg success">✅ ${codes.length} codes added!</div>`;
      document.getElementById('stock-codes').value = '';
    }
  };

  // --- ORDERS ---
  async function loadOrders() {
    const { data, error } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
    if (error || !data) return;
    document.getElementById('orders-list').innerHTML = data.map(o => `
      <tr>
        <td>${o.reference}</td>
        <td>${o.email}</td>
        <td>${o.currency} ${(o.amount_kobo/100).toFixed(2)}</td>
        <td><span class="badge ${o.status}">${o.status}</span></td>
      </tr>
    `).join('') || '<tr><td colspan="4">No orders yet</td></tr>';
  }

  // --- CHECK SESSION ON LOAD ---
  const { data: { session } } = await supabase.auth.getSession();
  if (session) showAdmin();
</script>
</body>
</html>
