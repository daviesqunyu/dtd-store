<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DTD Store — Instant Digital Delivery</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; }
    header { background: #111; padding: 20px; text-align: center; border-bottom: 1px solid #222; }
    header h1 { color: #00e5ff; font-size: 2rem; }
    header p { color: #aaa; font-size: 0.9rem; }
    .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 30px; max-width: 1200px; margin: auto; }
    .card { background: #1a1a1a; border: 1px solid #222; border-radius: 12px; padding: 20px; transition: transform 0.2s; }
    .card:hover { transform: translateY(-4px); border-color: #00e5ff; }
    .card h3 { font-size: 1.1rem; margin-bottom: 8px; }
    .card p { color: #aaa; font-size: 0.9rem; margin-bottom: 16px; }
    .price { color: #00e5ff; font-size: 1.3rem; font-weight: bold; margin-bottom: 16px; }
    .btn { background: #00e5ff; color: #000; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; }
    .btn:hover { background: #00b8d4; }
    .loading { text-align: center; padding: 60px; color: #aaa; }
    .empty { text-align: center; padding: 60px; color: #aaa; }
    footer { text-align: center; padding: 20px; color: #555; font-size: 0.8rem; border-top: 1px solid #222; margin-top: 40px; }
  </style>
</head>
<body>

<header>
  <h1>⚡ DTD Store</h1>
  <p>Instant Digital Delivery — Pay & Receive Immediately</p>
</header>

<div class="products" id="products">
  <div class="loading">Loading products...</div>
</div>

<footer>
  &copy; 2026 DTD Store by D&V Technologies
</footer>

<script>
  const SUPABASE_URL = 'https://dceepbjxwwqojxvmpduj.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjZWVwYmp4d3dxb2p4dm1wZHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5OTg5NTMsImV4cCI6MjA5NzU3NDk1M30.nr2JBQKQ5GxNJDitFoAkZn6QuUl98LlymQH5kuk5A6I';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadProducts() {
    const { data, error } = await supabase
      .from('products')
      .select('*')
      .eq('is_active', true);

    const container = document.getElementById('products');

    if (error || !data.length) {
      container.innerHTML = '<div class="empty">No products available yet.</div>';
      return;
    }

    container.innerHTML = data.map(p => `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.description || ''}</p>
        <div class="price">${p.currency} ${(p.price_kobo / 100).toFixed(2)}</div>
        <button class="btn" onclick="buyProduct('${p.id}', '${p.name}', ${p.price_kobo}, '${p.currency}')">
          Buy Now
        </button>
      </div>
    `).join('');
  }

  function buyProduct(id, name, price, currency) {
    localStorage.setItem('dtd_product', JSON.stringify({ id, name, price, currency }));
    window.location.href = 'checkout.html';
  }

  loadProducts();
</script>

</body>
</html>
