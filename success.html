<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Success — DTD Store</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .box { background: #1a1a1a; border: 1px solid #222; border-radius: 16px; padding: 32px; width: 100%; max-width: 480px; text-align: center; }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h2 { color: #00e5ff; margin-bottom: 8px; }
    p { color: #aaa; margin-bottom: 24px; }
    .delivery-box { background: #111; border: 1px solid #00e5ff; border-radius: 12px; padding: 20px; margin-bottom: 24px; text-align: left; }
    .delivery-box h4 { color: #00e5ff; margin-bottom: 10px; }
    .content { font-family: monospace; font-size: 1rem; word-break: break-all; background: #0a0a0a; padding: 12px; border-radius: 8px; color: #fff; }
    .ref { color: #555; font-size: 0.8rem; margin-bottom: 20px; }
    .btn { background: #00e5ff; color: #000; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; text-decoration: none; display: inline-block; }
    .loading { color: #aaa; }
    .error { color: #ff5252; }
  </style>
</head>
<body>
<div class="box">
  <div class="icon">⚡</div>
  <h2>Payment Confirmed!</h2>
  <p>Your order is being processed...</p>
  <div id="status" class="loading">Fetching your delivery...</div>
</div>

<script>
  const SUPABASE_URL = 'https://dceepbjxwwqojxvmpduj.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjZWVwYmp4d3dxb2p4dm1wZHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5OTg5NTMsImV4cCI6MjA5NzU3NDk1M30.nr2JBQKQ5GxNJDitFoAkZn6QuUl98LlymQH5kuk5A6I';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const ref = localStorage.getItem('dtd_ref');

  async function checkOrder() {
    if (!ref) {
      document.getElementById('status').innerHTML = '<p class="error">No order reference found.</p>';
      return;
    }

    const { data } = await supabase
      .from('orders')
      .select('*')
      .eq('reference', ref)
      .single();

    if (data && data.status === 'delivered' && data.delivered_content) {
      document.getElementById('status').innerHTML = `
        <div class="delivery-box">
          <h4>🎁 Your Delivery</h4>
          <div class="content">${data.delivered_content}</div>
        </div>
        <div class="ref">Ref: ${ref}</div>
        <a href="index.html" class="btn">Back to Store</a>
      `;
    } else {
      setTimeout(checkOrder, 3000);
    }
  }

  checkOrder();
</script>
</body>
</html>
