<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — DTD Store</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .box { background: #1a1a1a; border: 1px solid #222; border-radius: 16px; padding: 32px; width: 100%; max-width: 420px; }
    h2 { color: #00e5ff; margin-bottom: 8px; }
    .product-info { background: #111; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
    .product-info h3 { font-size: 1.1rem; }
    .product-info .price { color: #00e5ff; font-size: 1.4rem; font-weight: bold; margin-top: 6px; }
    label { display: block; margin-bottom: 6px; color: #aaa; font-size: 0.9rem; }
    input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 1rem; margin-bottom: 16px; }
    input:focus { outline: none; border-color: #00e5ff; }
    .btn { background: #00e5ff; color: #000; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; }
    .btn:hover { background: #00b8d4; }
    .back { text-align: center; margin-top: 16px; }
    .back a { color: #aaa; text-decoration: none; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="box">
  <h2>Complete Purchase</h2>
  <div class="product-info" id="product-info">Loading...</div>

  <label>Your Email</label>
  <input type="email" id="email" placeholder="you@example.com" />

  <label>Telegram Username (optional)</label>
  <input type="text" id="telegram" placeholder="@yourusername" />

  <button class="btn" onclick="pay()">Pay Now</button>

  <div class="back"><a href="index.html">← Back to Store</a></div>
</div>
